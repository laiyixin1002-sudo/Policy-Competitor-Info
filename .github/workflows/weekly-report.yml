name: Weekly Pharmacy Report

on:
  schedule:
    # 09:00 Asia/Shanghai every Monday = 01:00 UTC every Monday.
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-pharmacy-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update report period
        run: python scripts/update_report_period.py

      - name: Render report
        run: python scripts/render_html.py

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weekly_report.json reports/index.html reports/*.html
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "Generate weekly pharmacy report"
          git push origin HEAD:main
          git push origin HEAD:gh-pages

