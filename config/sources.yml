project:
  name: Policy-Competitor-Info
  report_name: 药学情报周报
  schedule:
    cron: "0 9 * * 1"
    timezone: Asia/Shanghai
    window:
      start: 上周一 00:00
      end: 本周一 09:00

source_rules:
  url_validation_required: true
  failed_url_destination: 待核实信息
  official_domains:
    四川美康: www.medicom.com.cn
    杭州逸耀: www.ipharmacare.net
  preferred_domains:
    采招网: www.bidcenter.com.cn
    中国政府采购网: www.ccgp.gov.cn
    全国公共资源交易平台: www.ggzy.gov.cn
    国家医保局: www.nhsa.gov.cn
    国家卫健委: www.nhc.gov.cn
  blocked_domains:
    - medicool.cn
    - mksoft.com.cn
    - medicomcn.com
    - iyiyao.com
    - iyiyao.cn
    - bidchuang.com
    - bidcheng.com

policy_levels:
  - 国家级
  - 省级
  - 市级
  - 区县级

source_categories:
  policy:
    - name: 国家医保局
